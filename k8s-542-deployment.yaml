apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-exercise-2
spec:
  replicas: 4
  selector:
    matchLabels:
      app: website-exercise-2
  template:
    metadata:
      labels:
        app: website-exercise-2
    spec:
      containers:
      - name: website-exercise-2
        image: rgundala/exercise:2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: website-exercise-2-svc
spec:
  selector:
    app: website-exercise-2
  ports:
  - port: 80
    targetPort: 80
  type: NodePort