apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-exercise-1
spec:
  replicas: 4
  selector:
    matchLabels:
      app: website-exercise-1
  template:
    metadata:
      labels:
        app: website-exercise-1
    spec:
      containers:
      - name: website-exercise-1
        image: rgundala/exercise:1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: website-exercise-1-svc
spec:
  selector:
    app: website-exercise-1
  ports:
  - port: 80
    targetPort: 80
  type: NodePort